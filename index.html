<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria de Posteres</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
    <h1>Acervo de Filmes Terríveis</h1>
    </header>
    <div class="gap"></div>
    <main> 
        <div class = "coluna">
            <div class="card">
                <img class="card-img" src="shyamalanavatar.jpg" alt="Poster de O Ultimo Mestre do ar">
                <p class="card-title">O Último Mestre do Ar</p>
            </div>
            <div class ="card">
                <img class="card-img" src="morbius.jpg" alt= "Poster de Morbius">
                <p class="card-title">Morbius</p>
            </div>
            <div class ="card">
                <img class="card-img" src="darkhorse.jpg" alt= "Poster de Dark Horse">
                <p class="card-title">Dark Horse</p>
            </div>
        </div>
        <div class = "coluna">
            <div class="card">
                <img class="card-img" src="vidadecarro.jpg" alt="Poster de Vida de Carro">
                <p class="card-title">Vida de Carro: A Grande Aventura de Sparky</p>
            </div>
            <div class="card">
                <img class = "card-img" src="jackandjill.jpg" alt= "Poster de Jack and Jill">
                <p class="card-title">Cada um tem a Gêmea que merece</p>
            </div>
            <div class ="card">
                <img class="card-img" src="animalfarm2026.jpg" alt= "Poster de Animal Farm 2026">
                <p class="card-title">Animal Farm do Seth Rogen</p>
            </div>
        </div>
        <div class = "coluna">
            <div class="card">
                <img class="card-img" src="ursinhopoohsangueemel.jpg" alt="Poster de Ursinho Pooh: Sangue e Mel">
                <p class="card-title">Ursinho Pooh: Sangue e Mel</p>
            </div>
            <div class = "card">
                <img class="card-img" src="guerradosmundos.jpg" alt="Poster de Guerra dos Mundos (2025)">
                <p class="card-title">Guerra dos Mundos (2025)</p>
            </div>
            <div class ="card">
                <img class="card-img" src="alphaandomega.jpg" alt= "Poster de Alpha e Omega">
                <p class="card-title">Essa coisa</p>
            </div>
        </div>
        <div class = "coluna">
            <div class="card">
                <img class="card-img" src="repete.jpg" alt="Poster de repete">
                <p class="card-title">repete</p>
            </div>
            <div class="card">
                <img class="card-img" src="eaicomeu.jpg" alt="Poster de E ai Comeu">
                <p class="card-title">E ai... Comeu?</p>
            </div>
            <div class="card">
                <img class="card-img" src="bye-bye-man.jpg" alt="Poster de Bye Bye Man">
                <p class="card-title">esse outro filme</p>
            </div>
        </div>
    </main>
</body>
</html>
